# Training Configuration

part_discovery:
  epochs: 15  # Reduced for faster iteration (was 50, ~15min/epoch)
  learning_rate: 0.0005   # tuned for smoother convergence on MPS
  weight_decay: 0.00005
  optimizer: "adamw"      # more stable for Slot Attention
  scheduler:
    type: "cosine_warmup"
    warmup_epochs: 2      # reduced for shorter training
    T_max: 15             # match epochs
    eta_min: 0.000001     # lower floor for final refinement
  
  # Mixed precision for MPS = large speed boost
  mixed_precision: true
  
  # Checkpointing
  checkpoint_dir: "../checkpoints/part_discovery"
  save_every: 5  # Save every 5 epochs
  save_best: true
  
  # Logging
  log_every: 20
  visualize_every: 200   # reduced compute overhead

  # Dataloader (for Apple M4)
  dataloader:
    batch_size: 16
    num_workers: 2
    pin_memory: false
    persistent_workers: true

classification:
  epochs: 50
  learning_rate: 0.0008  # smaller LR for stability in fine-tuning
  weight_decay: 0.00005
  optimizer: "adamw"
  scheduler:
    type: "step"
    step_size: 15
    gamma: 0.2
  
  checkpoint_dir: "../checkpoints/classification"
  save_every: 5
  save_best: true

  log_every: 15

  dataloader:
    batch_size: 32
    num_workers: 2
    pin_memory: false
    persistent_workers: true

mlflow:
  experiment_name: "interpretable_space"
  tracking_uri: "http://0.0.0.0:5050"  # MLflow tracking server
  enabled: true  # Set to false to disable tracking
  tags:
    architecture: "slot-attention"
    dataset: "custom-128"
    num_classes: "3"
    device: "m4-mps"
  run_name_prefix: "part_discovery"
  notes: "MPS optimized training with mixed precision and AdamW"

early_stopping:
  patience: 7
  min_delta: 0.0008