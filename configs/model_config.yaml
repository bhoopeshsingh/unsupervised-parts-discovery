# Model Architecture Configuration

# Shared Backbone
backbone:
  name: "resnet50"
  pretrained: true
  freeze_early_layers: true  # Changed to TRUE to stabilize features
  use_layer4: false  # Use Layer3 for better spatial resolution (8x8 vs 4x4)
  feature_dim: 1024  # ResNet50 Layer3 output dimension (changed from 2048)

# Slot Attention for Part Discovery
slot_attention:
  num_slots: 8  # Increased from 6 for finer-grained parts
  slot_dim: 128  # Dimension of each slot
  hidden_dim: 256  # Hidden dimension for MLP
  num_iterations: 8  # Increased for better slot competition

  # Encoder (processes backbone features)
  encoder:
    input_dim: 1024  # From ResNet50 Layer3 (changed from 2048)
    output_dim: 128  # Match slot_dim
    hidden_dims: [512, 256]
  
  # Decoder (for reconstruction)
  decoder:
    input_dim: 128
    hidden_dims: [256, 512]
    output_channels: 3  # RGB
    output_size: 128  # Match data config
  
  # Loss weights
  loss:
    reconstruction_weight: 1.0
    diversity_weight: 0.1  # Encourage diverse slots
    spatial_coherence_weight: 1.5  # Penalize scattered attention (increased for better spatial consistency)
    size_regularization_weight: 0.5  # Discourage too small/large parts (increased)

# Classification Head
classifier:
  input_dim: 1024  # From ResNet50 Layer3 (changed from 2048)
  hidden_dims: [512, 256]
  num_classes: 3  # airplane, cat, dog
  dropout: 0.3

# Device settings
device: "mps"  # For M4 Mac (use "cuda" for NVIDIA, "cpu" for CPU-only)
